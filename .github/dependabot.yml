version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      playwright:
        patterns:
          - "playwright"
          - "@playwright/test"
          - "eslint-plugin-playwright"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "typescript-eslint"
